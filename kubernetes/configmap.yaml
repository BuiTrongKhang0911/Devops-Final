# =============================================================================
# CONFIGMAP.YAML - Environment variables (non-sensitive)
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: devops-final
data:
  # External Database (EC2 standalone)
  POSTGRES_DB: "document_db"
  POSTGRES_USER: "docuser"
  DB_HOST: "PLACEHOLDER_DB_HOST"  # Sẽ được thay thế bởi CI/CD với DATA_SERVER_IP
  
  # Spring Boot - Connect to external PostgreSQL
  SPRING_DATASOURCE_URL: "jdbc:postgresql://PLACEHOLDER_DB_HOST:5432/document_db"
  SPRING_DATASOURCE_USERNAME: "docuser"
  SPRING_JPA_HIBERNATE_DDL_AUTO: "update"
  SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: "org.hibernate.dialect.PostgreSQLDialect"
  APP_UPLOAD_DIR: "/app/uploads"
  
  # NFS Server
  NFS_SERVER: "PLACEHOLDER_NFS_SERVER"  # Sẽ được thay thế bởi CI/CD với DATA_SERVER_IP

