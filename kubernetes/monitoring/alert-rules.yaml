apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: custom-alert-rules
  namespace: monitoring
  labels:
    prometheus: kube-prometheus-stack-prometheus
    role: alert-rules
spec:
  groups:
    # =======================================================================
    # APPLICATION ALERTS - Monitor ứng dụng Document Management
    # =======================================================================
    - name: application-alerts
      interval: 30s
      rules:
        # Alert khi pod bị crash/restart liên tục
        - alert: PodCrashLooping
          expr: rate(kube_pod_container_status_restarts_total{namespace="devops-final"}[5m]) > 0
          for: 2m
          labels:
            severity: critical
            component: application
          annotations:
            summary: "Pod {{ $labels.pod }} đang crash loop"
            description: "Pod {{ $labels.pod }} trong namespace {{ $labels.namespace }} đã restart {{ $value }} lần trong 5 phút qua."
        
        # Alert khi pod không ready
        - alert: PodNotReady
          expr: kube_pod_status_phase{namespace="devops-final", phase!="Running"} == 1
          for: 2m
          labels:
            severity: warning
            component: application
          annotations:
            summary: "Pod {{ $labels.pod }} không ở trạng thái Running"
            description: "Pod {{ $labels.pod }} đang ở trạng thái {{ $labels.phase }} trong {{ $labels.namespace }}."
        
        # Alert khi deployment không đủ replicas
        - alert: DeploymentReplicasMismatch
          expr: kube_deployment_spec_replicas{namespace="devops-final"} != kube_deployment_status_replicas_available{namespace="devops-final"}
          for: 2m
          labels:
            severity: warning
            component: application
          annotations:
            summary: "Deployment {{ $labels.deployment }} thiếu replicas"
            description: "Deployment {{ $labels.deployment }} cần replicas nhưng chỉ có available."

    # =======================================================================
    # INFRASTRUCTURE ALERTS - Monitor EKS nodes và resources
    # =======================================================================
    - name: infrastructure-alerts
      interval: 30s
      rules:
        # Alert khi node CPU cao
        - alert: NodeCPUHigh
          expr: (100 - (avg by (instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)) > 80
          for: 2m
          labels:
            severity: warning
            component: infrastructure
          annotations:
            summary: "Node {{ $labels.instance }} CPU usage cao"
            description: "Node {{ $labels.instance }} đang sử dụng CPU cao."
        
        # Alert khi node memory cao
        - alert: NodeMemoryHigh
          expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
          for: 2m
          labels:
            severity: warning
            component: infrastructure
          annotations:
            summary: "Node {{ $labels.instance }} memory usage cao"
            description: "Node {{ $labels.instance }} đang sử dụng memory cao."
        
        # Alert khi node disk space thấp
        - alert: NodeDiskSpaceLow
          expr: (1 - (node_filesystem_avail_bytes{fstype!="tmpfs"} / node_filesystem_size_bytes{fstype!="tmpfs"})) * 100 > 85
          for: 2m
          labels:
            severity: warning
            component: infrastructure
          annotations:
            summary: "Node {{ $labels.instance }} disk space thấp"
            description: "Filesystem {{ $labels.mountpoint }} trên {{ $labels.instance }} đã sử dụng nhiều disk."

    # =======================================================================
    # KUBERNETES ALERTS - Monitor K8s components
    # =======================================================================
    - name: kubernetes-alerts
      interval: 30s
      rules:
        # Alert khi có pod pending quá lâu
        - alert: PodPendingTooLong
          expr: kube_pod_status_phase{phase="Pending"} == 1
          for: 2m
          labels:
            severity: warning
            component: kubernetes
          annotations:
            summary: "Pod {{ $labels.pod }} pending quá lâu"
            description: "Pod {{ $labels.pod }} trong namespace {{ $labels.namespace }} đã pending hơn 2 phút."
        
        # Alert khi PVC không bound
        - alert: PersistentVolumeClaimPending
          expr: kube_persistentvolumeclaim_status_phase{phase="Pending"} == 1
          for: 2m
          labels:
            severity: warning
            component: kubernetes
          annotations:
            summary: "PVC {{ $labels.persistentvolumeclaim }} không bound"
            description: "PVC {{ $labels.persistentvolumeclaim }} trong namespace {{ $labels.namespace }} đang pending."

