apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-kube-prometheus-stack-alertmanager
  namespace: monitoring
type: Opaque
stringData:
  alertmanager.yaml: |-
    global:
      resolve_timeout: 5m
    
    route:
      group_by: ['alertname', 'cluster', 'service']
      group_wait: 10s
      group_interval: 10s
      repeat_interval: 12h
      receiver: 'default-receiver'
      routes:
        - matchers:
            - severity = "critical"
          receiver: 'critical-receiver'
          continue: true
        - matchers:
            - severity = "warning"
          receiver: 'warning-receiver'
          continue: true
    
    receivers:
      - name: 'default-receiver'
        webhook_configs:
          - url: 'http://localhost:5001/default'
            send_resolved: true
      - name: 'critical-receiver'
        webhook_configs:
          - url: 'http://localhost:5001/critical'
            send_resolved: true
      - name: 'warning-receiver'
        webhook_configs:
          - url: 'http://localhost:5001/warning'
            send_resolved: true
    
    inhibit_rules:
      - source_matchers:
          - severity = "critical"
        target_matchers:
          - severity = "warning"
        equal: ['alertname', 'instance']



