# =============================================================================
# BACKEND SERVICE - Internal access cho backend API
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: backend-svc
  namespace: devops-final
  labels:
    app: backend
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
