# =============================================================================
# BACKEND SERVICE - Expose backend pods
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: backend-svc
  namespace: devops-final
  labels:
    app: backend
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: 8080
