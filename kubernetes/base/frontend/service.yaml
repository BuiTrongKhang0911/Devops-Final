# =============================================================================
# FRONTEND SERVICE - Expose frontend pods
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: frontend-svc
  namespace: devops-final
  labels:
    app: frontend
spec:
  type: ClusterIP
  selector:
    app: frontend
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
