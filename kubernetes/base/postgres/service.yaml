# =============================================================================
# POSTGRES SERVICE - Internal access cho database
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: postgres-svc
  namespace: devops-final
  labels:
    app: postgres
spec:
  type: ClusterIP
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
