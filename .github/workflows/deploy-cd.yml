# =============================================================================
# DEPLOY-CD.YML - Continuous Deployment Pipeline for EKS
# =============================================================================
# Mục đích: Deploy ứng dụng lên Amazon EKS cluster
# Trigger: Tự động chạy khi "Build & Release Docker" thành công
# =============================================================================

name: Continuous Deployment (CD)

# Chỉ kích hoạt khi workflow "Build & Release Docker" hoàn thành
on:
  workflow_run:
    workflows: ["Build & Release Docker"]
    types:
      - completed

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  AWS_REGION: ap-southeast-1

jobs:
  # ===========================================================================
  # JOB: DEPLOY TO EKS
  # ===========================================================================
  deploy:
    name: Deploy to Amazon EKS
    runs-on: ubuntu-latest
    # Chỉ chạy nếu CI workflow thành công
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      # =========================================================================
      # BƯỚC 1: Checkout code (để lấy kubernetes manifests)
      # =========================================================================
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      # =========================================================================
      # BƯỚC 2: Configure AWS Credentials
      # =========================================================================
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # =========================================================================
      # BƯỚC 3: Verify AWS Credentials and Configure kubectl
      # =========================================================================
      - name: Verify AWS Credentials
        run: |
          echo "🔐 Verifying AWS credentials..."
          aws sts get-caller-identity
          
      - name: Configure kubectl for EKS
        run: |
          echo "⚙️ Configuring kubectl for EKS..."
          aws eks update-kubeconfig --name ${{ secrets.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}
          
          echo "📋 kubectl version:"
          kubectl version --client
          
          echo "🔍 Testing cluster connection..."
          kubectl cluster-info

      # =========================================================================
      # BƯỚC 4: Update image tags, DB host, NFS server, và secrets
      # =========================================================================
      - name: Update Image Tags and Configuration
        run: |
          # Lấy SHA từ workflow_run event
          COMMIT_SHA="${{ github.event.workflow_run.head_sha }}"
          SHORT_SHA=$(echo "$COMMIT_SHA" | cut -c1-7)
          
          echo "📦 Deploying commit: $COMMIT_SHA"
          echo "📦 Short SHA: $SHORT_SHA"
          
          # Update backend image - thay thế cả DOCKER_USERNAME và PLACEHOLDER_IMAGE_TAG
          sed -i "s|DOCKER_USERNAME|${{ env.DOCKER_USERNAME }}|g" \
            kubernetes/base/backend/deployment.yaml
          sed -i "s|PLACEHOLDER_IMAGE_TAG|sha-${SHORT_SHA}|g" \
            kubernetes/base/backend/deployment.yaml
          
          # Update frontend image - thay thế cả DOCKER_USERNAME và PLACEHOLDER_IMAGE_TAG
          sed -i "s|DOCKER_USERNAME|${{ env.DOCKER_USERNAME }}|g" \
            kubernetes/base/frontend/deployment.yaml
          sed -i "s|PLACEHOLDER_IMAGE_TAG|sha-${SHORT_SHA}|g" \
            kubernetes/base/frontend/deployment.yaml
          
          # Update ConfigMap với DATA_SERVER_IP (cho cả DB và NFS)
          sed -i "s|PLACEHOLDER_DB_HOST|${{ secrets.DATA_SERVER_IP }}|g" \
            kubernetes/configmap.yaml
          sed -i "s|PLACEHOLDER_NFS_SERVER|${{ secrets.DATA_SERVER_IP }}|g" \
            kubernetes/configmap.yaml
          
          # Update NFS PersistentVolume
          sed -i "s|PLACEHOLDER_NFS_SERVER|${{ secrets.DATA_SERVER_IP }}|g" \
            kubernetes/nfs-pv.yaml
          
          # Update secrets
          sed -i "s|PLACEHOLDER_DB_PASSWORD|${{ secrets.DB_PASSWORD }}|g" \
            kubernetes/secrets.yaml
          
          echo "✅ Updated images to tag: sha-${SHORT_SHA}"
          echo "✅ Updated DB host: ${{ secrets.DATA_SERVER_IP }}"
          echo "✅ Updated NFS server: ${{ secrets.DATA_SERVER_IP }}"
          echo "✅ Updated secrets from GitHub Secrets"

      # =========================================================================
      # BƯỚC 5: Deploy to EKS
      # =========================================================================
      - name: Deploy to EKS
        run: |
          set -e
          
          echo "🚀 Starting EKS Deployment..."
          
          # Apply namespace first
          kubectl apply -f kubernetes/namespace.yaml
          
          # Apply configs and secrets
          kubectl apply -f kubernetes/configmap.yaml
          kubectl apply -f kubernetes/secrets.yaml
          
          # Apply NFS PersistentVolume and PVC
          kubectl apply -f kubernetes/nfs-pv.yaml
          
          # Wait for PVC to be bound
          echo "⏳ Waiting for NFS PVC to be bound..."
          kubectl wait --for=jsonpath='{.status.phase}'=Bound pvc/nfs-uploads-pvc -n devops-final --timeout=60s || true
          
          # Apply backend
          kubectl apply -f kubernetes/base/backend/
          
          # Apply frontend
          kubectl apply -f kubernetes/base/frontend/
          
          # Apply HPA
          kubectl apply -f kubernetes/base/backend/hpa.yaml
          kubectl apply -f kubernetes/base/frontend/hpa.yaml
          
          # Apply ingress
          kubectl apply -f kubernetes/ingress.yaml
          
          # Force rollout để pull image mới
          kubectl rollout restart deployment/backend -n devops-final
          kubectl rollout restart deployment/frontend -n devops-final
          
          # Wait for rollout
          echo "⏳ Waiting for rollout to complete..."
          kubectl rollout status deployment/backend -n devops-final --timeout=180s
          kubectl rollout status deployment/frontend -n devops-final --timeout=180s
          
          echo "✅ Deployment completed successfully!"

      # =========================================================================
      # BƯỚC 6: Verify Deployment
      # =========================================================================
      - name: Verify Deployment
        run: |
          echo ""
          echo "📊 Current Pod Status:"
          kubectl get pods -n devops-final -o wide
          echo ""
          echo "📊 Current Services:"
          kubectl get svc -n devops-final
          echo ""
          echo "📊 Current Ingress:"
          kubectl get ingress -n devops-final

      # =========================================================================
      # BƯỚC 7: Print Deployment Summary
      # =========================================================================
      - name: Print Deployment Summary
        run: |
          COMMIT_SHA="${{ github.event.workflow_run.head_sha }}"
          SHORT_SHA=$(echo "$COMMIT_SHA" | cut -c1-7)
          echo "============================================="
          echo "🎉 DEPLOYMENT COMPLETED!"
          echo "============================================="
          echo "Commit: $COMMIT_SHA"
          echo "Backend Image: ${{ env.DOCKER_USERNAME }}/document-management-backend:sha-${SHORT_SHA}"
          echo "Frontend Image: ${{ env.DOCKER_USERNAME }}/document-management-frontend:sha-${SHORT_SHA}"
          echo "EKS Cluster: ${{ secrets.EKS_CLUSTER_NAME }}"
          echo "Region: ${{ env.AWS_REGION }}"
          echo "Namespace: devops-final"
          echo "Data Server: ${{ secrets.DATA_SERVER_IP }}"
          echo "============================================="

  # ===========================================================================
  # JOB: NOTIFY ON FAILURE (Optional)
  # ===========================================================================
  notify-ci-failed:
    name: Notify CI Failed
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    
    steps:
      - name: CI Failed Notification
        run: |
          echo "============================================="
          echo "❌ CI PIPELINE FAILED!"
          echo "============================================="
          echo "CD Pipeline skipped because CI failed."
          echo "Please check the 'Build & Release Docker' workflow."
          echo "Commit: ${{ github.event.workflow_run.head_sha }}"
          echo "============================================="
