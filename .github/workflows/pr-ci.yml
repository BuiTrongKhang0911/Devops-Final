# =============================================================================
# PR-CI.YML - Quality Gate & Security Gatekeeper
# =============================================================================
# Mục đích: Kiểm duyệt chất lượng code trước khi merge vào main
# Trigger: Mỗi khi có Pull Request vào nhánh main
# =============================================================================

name: PR Quality Gate

on:
  pull_request:
    branches:
      - main

# Ngăn chặn chạy đồng thời nhiều workflow cho cùng một PR
concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: Code Quality & Security Check
    runs-on: ubuntu-latest

    steps:
      # =========================================================================
      # BƯỚC 1: Checkout code với full history (bắt buộc cho SonarQube)
      # =========================================================================
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # fetch-depth: 0 để lấy toàn bộ lịch sử commit
          # SonarQube cần đọc history để phân tích blame information và detect new code
          fetch-depth: 0

      # =========================================================================
      # BƯỚC 2: Cài đặt Java 21 (Temurin) + Maven Caching
      # =========================================================================
      - name: Setup Java 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          # Tự động cache Maven dependencies (~/.m2/repository)
          # Giảm thời gian build từ ~3-5 phút xuống ~30 giây cho các lần sau
          cache: 'maven'

      # =========================================================================
      # BƯỚC 3: Kiểm tra Code Style với Checkstyle
      # =========================================================================
      - name: Run Checkstyle
        run: mvn checkstyle:checkstyle --batch-mode --no-transfer-progress
        # --batch-mode: Chạy non-interactive mode, thích hợp cho CI
        # --no-transfer-progress: Ẩn download progress, log sạch hơn

      # =========================================================================
      # BƯỚC 4: Chạy Unit Tests
      # =========================================================================
      - name: Run Unit Tests
        run: mvn test --batch-mode --no-transfer-progress
        # Test sẽ tự động fail pipeline nếu có test case nào không pass

      # =========================================================================
      # BƯỚC 5: Cache SonarQube packages (tăng tốc scan)
      # =========================================================================
      - name: Cache SonarQube Packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-sonar-

      # =========================================================================
      # BƯỚC 6: SonarQube Scan - Phân tích code quality & security vulnerabilities
      # =========================================================================
      - name: SonarQube Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          mvn sonar:sonar \
            --batch-mode \
            --no-transfer-progress \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.projectKey=${{ github.repository_owner }}_${{ github.event.repository.name }} \
            -Dsonar.projectName=${{ github.event.repository.name }} \
            -Dsonar.pullrequest.key=${{ github.event.pull_request.number }} \
            -Dsonar.pullrequest.branch=${{ github.head_ref }} \
            -Dsonar.pullrequest.base=${{ github.base_ref }}

      # =========================================================================
      # BƯỚC 7: Quality Gate Check - BẮT BUỘC PASS mới được merge
      # =========================================================================
      - name: SonarQube Quality Gate Check
        uses: sonarsource/sonarqube-quality-gate-action@master
        # Timeout 5 phút chờ SonarQube xử lý analysis report
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        # Action này sẽ tự động FAIL pipeline nếu Quality Gate không PASS
        # Ví dụ: Code coverage < 80%, có Critical/High vulnerabilities, code smells quá nhiều
