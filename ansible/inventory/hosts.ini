# =============================================================================
# ANSIBLE INVENTORY - Template (sẽ được setup.sh/setup.ps1 tự động điền)
# =============================================================================
# File này sẽ được ghi đè bởi setup script
# Nếu chạy thủ công, thay các placeholder bằng giá trị thật
# =============================================================================

[k8s_master]
k8s-master ansible_host=<K8S_IP> ansible_user=ubuntu ansible_ssh_private_key_file=<SSH_KEY_PATH>

[k8s_master:vars]
ansible_python_interpreter=/usr/bin/python3

[sonarqube]
sonarqube ansible_host=<SONARQUBE_IP> ansible_user=ubuntu ansible_ssh_private_key_file=<SSH_KEY_PATH>

[sonarqube:vars]
ansible_python_interpreter=/usr/bin/python3

[all:vars]
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'
