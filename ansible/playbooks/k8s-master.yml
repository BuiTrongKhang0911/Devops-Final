# =============================================================================
# K8S-MASTER.YML - Main Playbook cài đặt Kubernetes Master Node
# =============================================================================
# Mục đích: Cài đặt và cấu hình K8s single-node cluster (Tier 5)
# Chạy: ansible-playbook -i inventory/hosts.ini playbooks/k8s-master.yml
# =============================================================================

---
- name: Setup Kubernetes Master Node
  hosts: k8s_master
  become: yes
  gather_facts: yes

  vars:
    kubernetes_version: "1.29"
    pod_network_cidr: "10.244.0.0/16"
    calico_version: "v3.27.0"

  roles:
    - common
    - containerd
    - kubernetes
    - ingress-nginx

  post_tasks:
    - name: Hiển thị thông tin cluster
      debug:
        msg: |
          ============================================
          🎉 KUBERNETES CLUSTER ĐÃ SẴN SÀNG!
          ============================================
          Master IP: {{ ansible_host }}
          
          Kiểm tra cluster:
            kubectl get nodes
            kubectl get pods -A
          
          ============================================
