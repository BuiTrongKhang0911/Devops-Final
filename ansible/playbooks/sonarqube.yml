# =============================================================================
# SONARQUBE.YML - Cài đặt SonarQube Server
# =============================================================================
# Chạy: ansible-playbook -i inventory/hosts.ini playbooks/sonarqube.yml
# =============================================================================

---
- name: Setup SonarQube Server
  hosts: sonarqube
  become: yes
  gather_facts: yes

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Upgrade all packages
      apt:
        upgrade: dist
        autoremove: yes

    - name: Install required packages
      apt:
        name:
          - docker.io
          - python3-docker
        state: present

    - name: Start and enable Docker service
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes

    - name: Configure kernel parameters for Elasticsearch
      sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        state: present
        reload: yes
      loop:
        - { key: 'vm.max_map_count', value: '524288' }
        - { key: 'fs.file-max', value: '131072' }

    - name: Set ulimits for SonarQube
      pam_limits:
        domain: '*'
        limit_type: '-'
        limit_item: "{{ item.item }}"
        value: "{{ item.value }}"
      loop:
        - { item: 'nofile', value: '131072' }
        - { item: 'nproc', value: '8192' }

    - name: Create Docker volumes for SonarQube
      docker_volume:
        name: "{{ item }}"
        state: present
      loop:
        - sonarqube_data
        - sonarqube_logs
        - sonarqube_extensions

    - name: Run SonarQube container
      docker_container:
        name: sonarqube
        image: sonarqube:community
        state: started
        restart_policy: always
        ports:
          - "9000:9000"
        volumes:
          - sonarqube_data:/opt/sonarqube/data
          - sonarqube_logs:/opt/sonarqube/logs
          - sonarqube_extensions:/opt/sonarqube/extensions

    - name: Wait for SonarQube to be ready
      uri:
        url: "http://localhost:9000/api/system/status"
        method: GET
        status_code: 200
      register: result
      until: result.status == 200
      retries: 30
      delay: 10

    - name: Display SonarQube info
      debug:
        msg: |
          ============================================
          🔍 SONARQUBE SERVER READY!
          ============================================
          URL: http://{{ ansible_host }}:9000
          Default credentials: admin / admin
          
          ⚠️  Change password on first login!
          ============================================

    # =========================================================================
    # NGINX REVERSE PROXY + HTTPS (CERTBOT) - CHỈ KHI ENABLE_HTTPS=true
    # =========================================================================
    - name: Install Nginx and Certbot
      apt:
        name:
          - nginx
          - certbot
          - python3-certbot-nginx
        state: present
        update_cache: yes
      when: enable_https | default('false') == 'true' and domain_name | default('') != ''

    - name: Remove default Nginx config
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      when: enable_https | default('false') == 'true' and domain_name | default('') != ''

    - name: Create Nginx config for SonarQube (HTTP first for Certbot)
      copy:
        dest: /etc/nginx/sites-available/sonarqube
        content: |
          server {
              listen 80;
              server_name sonar.{{ domain_name }};
              
              location / {
                  proxy_pass http://127.0.0.1:9000;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
              }
          }
      when: enable_https | default('false') == 'true' and domain_name | default('') != ''
      notify: Restart Nginx

    - name: Enable Nginx config
      file:
        src: /etc/nginx/sites-available/sonarqube
        dest: /etc/nginx/sites-enabled/sonarqube
        state: link
      when: enable_https | default('false') == 'true' and domain_name | default('') != ''
      notify: Restart Nginx

    - name: Ensure Nginx is running
      service:
        name: nginx
        state: started
        enabled: yes
      when: enable_https | default('false') == 'true' and domain_name | default('') != ''

    - name: Wait for DNS propagation
      wait_for:
        timeout: 30
      when: enable_https | default('false') == 'true' and domain_name | default('') != ''

    - name: Run Certbot to get HTTPS certificate
      command: >
        certbot --nginx 
        -d sonar.{{ domain_name }} 
        --non-interactive 
        --agree-tos 
        -m admin@{{ domain_name }}
        --redirect
      args:
        creates: /etc/letsencrypt/live/sonar.{{ domain_name }}/fullchain.pem
      when: enable_https | default('false') == 'true' and domain_name | default('') != ''
      register: certbot_result
      ignore_errors: yes

    - name: Display Certbot result
      debug:
        msg: |
          ============================================
          🔒 HTTPS CONFIGURATION
          ============================================
          {% if certbot_result.rc == 0 %}
          ✅ HTTPS enabled successfully!
          URL: https://sonar.{{ domain_name }}
          Certificate: Let's Encrypt (auto-renew enabled)
          {% else %}
          ⚠️  Certbot failed. Check:
          1. DNS record sonar.{{ domain_name }} points to {{ ansible_host }}
          2. Port 80/443 are open in Security Group
          3. Run manually: certbot --nginx -d sonar.{{ domain_name }}
          {% endif %}
          ============================================
      when: enable_https | default('false') == 'true' and domain_name | default('') != ''

    - name: Configure SonarQube base URL for HTTPS
      lineinfile:
        path: /opt/sonarqube/conf/sonar.properties
        regexp: '^#?sonar.core.serverBaseURL='
        line: 'sonar.core.serverBaseURL=https://sonar.{{ domain_name }}'
        create: yes
      when: enable_https | default('false') == 'true' and domain_name | default('') != '' and certbot_result.rc == 0
      notify: Restart SonarQube Container

  handlers:
    - name: Restart Nginx
      service:
        name: nginx
        state: restarted

    - name: Restart SonarQube Container
      docker_container:
        name: sonarqube
        state: started
        restart: yes
