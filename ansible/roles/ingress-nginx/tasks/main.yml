# =============================================================================
# INGRESS-NGINX ROLE - Cài đặt NGINX Ingress Controller
# =============================================================================
---
- name: Download NGINX Ingress Controller manifest
  ansible.builtin.get_url:
    url: https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.8.2/deploy/static/provider/baremetal/deploy.yaml
    dest: /tmp/ingress-nginx.yaml
    mode: '0644'

- name: Apply NGINX Ingress Controller
  ansible.builtin.command:
    cmd: kubectl apply -f /tmp/ingress-nginx.yaml
  become: yes
  become_user: ubuntu
  register: ingress_apply
  changed_when: "'created' in ingress_apply.stdout or 'configured' in ingress_apply.stdout"

- name: Wait for Ingress Controller to be ready
  ansible.builtin.command:
    cmd: kubectl wait --namespace ingress-nginx --for=condition=ready pod --selector=app.kubernetes.io/component=controller --timeout=180s
  become: yes
  become_user: ubuntu
  retries: 3
  delay: 10
  register: ingress_ready
  until: ingress_ready.rc == 0

- name: Get Ingress Controller NodePort
  ansible.builtin.shell: |
    kubectl get svc -n ingress-nginx ingress-nginx-controller -o jsonpath='{.spec.ports[?(@.name=="http")].nodePort}'
  become: yes
  become_user: ubuntu
  register: ingress_nodeport
  changed_when: false

- name: Display Ingress Access Information
  ansible.builtin.debug:
    msg: |
      ============================================
      🎉 NGINX INGRESS CONTROLLER ĐÃ CÀI ĐẶT!
      ============================================
      Access app tại:
        http://{{ ansible_host }}:{{ ingress_nodeport.stdout }}
      
      Kiểm tra ingress:
        kubectl get ingress -A
        kubectl get svc -n ingress-nginx
      ============================================
