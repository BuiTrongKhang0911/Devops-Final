# =============================================================================
# CONTAINERD ROLE - Cài đặt Container Runtime
# =============================================================================

---
- name: Tạo thư mục keyrings
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Thêm Docker GPG key (containerd repo)
  get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'

- name: Thêm Docker repository
  apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present
    filename: docker

- name: Cài đặt containerd
  apt:
    name: containerd.io
    state: present
    update_cache: yes

- name: Tạo thư mục config containerd
  file:
    path: /etc/containerd
    state: directory

- name: Xóa config cũ của containerd (nếu có)
  file:
    path: /etc/containerd/config.toml
    state: absent

- name: Tạo config mặc định cho containerd
  shell: containerd config default > /etc/containerd/config.toml

- name: Cấu hình SystemdCgroup = true (bắt buộc cho K8s)
  replace:
    path: /etc/containerd/config.toml
    regexp: 'SystemdCgroup = false'
    replace: 'SystemdCgroup = true'

- name: Restart containerd ngay lập tức
  systemd:
    name: containerd
    state: restarted
    enabled: yes
    daemon_reload: yes

- name: Đợi containerd sẵn sàng
  pause:
    seconds: 5
