# =============================================================================
# COMMON ROLE - Cấu hình cơ bản cho tất cả servers
# =============================================================================

---
- name: Cập nhật apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Cài đặt các packages cơ bản
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      - software-properties-common
      - wget
      - vim
      - htop
      - net-tools
      - jq
    state: present

- name: Tắt swap (bắt buộc cho Kubernetes)
  command: swapoff -a
  changed_when: false

- name: Xóa swap khỏi fstab (persistent)
  lineinfile:
    path: /etc/fstab
    regexp: '.*swap.*'
    state: absent

- name: Load kernel modules cho containerd
  modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - overlay
    - br_netfilter

- name: Đảm bảo modules load khi boot
  copy:
    dest: /etc/modules-load.d/k8s.conf
    content: |
      overlay
      br_netfilter

- name: Cấu hình sysctl cho Kubernetes networking
  sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    state: present
    reload: yes
    sysctl_file: /etc/sysctl.d/k8s.conf
  loop:
    - { key: 'net.bridge.bridge-nf-call-iptables', value: '1' }
    - { key: 'net.bridge.bridge-nf-call-ip6tables', value: '1' }
    - { key: 'net.ipv4.ip_forward', value: '1' }

- name: Apply sysctl settings
  command: sysctl --system
  changed_when: false
